<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeJapon Admin - Offline</title>
    <meta name="theme-color" content="#1c1816" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff;
        color: #15171f;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(420px, calc(100vw - 40px));
        text-align: center;
      }
      img {
        width: 88px;
        height: auto;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #596071;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/favicon.png" alt="LeJapon.ma" />
      <h1>Connexion indisponible</h1>
      <p>L'application admin est prete a reprendre des que le reseau revient. Les donnees sensibles restent chargees depuis Supabase lorsque vous etes en ligne.</p>
    </main>
  </body>
</html>
